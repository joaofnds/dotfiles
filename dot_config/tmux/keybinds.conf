unbind C-b

# Send prefix key when pressed twice
bind-key -r C-s send-prefix

# Reload config on <C-s, r>
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Quickly edit todo list
bind-key t split-window -h "emacs -nw ~/org/home.org"

# Prompted join-pane
bind-key j command-prompt -p "join pane from: "  "join-pane -h -s '%%'"

# Easily swap a pane (targeted by pane number) with the current pane
bind-key s display-panes\; command-prompt -p "pane #: "  "swap-pane -t '%%'"

# fuzzy find sessions — xargs -I{} skips execution on empty input
bind C-j display-popup -E -w 80% -h 60% "tmux list-sessions -F '#S' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse --select-1 --exit-0 --preview 'tmux capture-pane -e -p -t {}' --preview-window right:70% | xargs -I{} tmux switch-client -t {}"

# Restore clear screen (stolen by C-l pane navigation below)
bind C-l send-keys C-l

setw -g mode-keys vi

## panes
# smart pane switching with awareness of vim/emacs splits
# tmux format match — no fork, evaluated natively by tmux
set -g @vim_emacs_pattern '(^|\/)g?(view|n?vim?x?)(diff)?$|emacs'

# enable in root key table
bind -n C-h if -F '#{m/ri:#{@vim_emacs_pattern},#{pane_current_command}}' "send-keys C-h" "select-pane -L"
bind -n C-j if -F '#{m/ri:#{@vim_emacs_pattern},#{pane_current_command}}' "send-keys C-j" "select-pane -D"
bind -n C-k if -F '#{m/ri:#{@vim_emacs_pattern},#{pane_current_command}}' "send-keys C-k" "select-pane -U"
bind -n C-l if -F '#{m/ri:#{@vim_emacs_pattern},#{pane_current_command}}' "send-keys C-l" "select-pane -R"
bind -n C-'\' if -F '#{m/ri:#{@vim_emacs_pattern},#{pane_current_command}}' "send-keys 'C-\\'" "select-pane -l"

# in copy mode the editor is not active, so navigate panes directly
bind -Tcopy-mode-vi C-h select-pane -L
bind -Tcopy-mode-vi C-j select-pane -D
bind -Tcopy-mode-vi C-k select-pane -U
bind -Tcopy-mode-vi C-l select-pane -R
bind -Tcopy-mode-vi C-'\' select-pane -l

### resize (prefixed hjkl — no system-key conflicts)
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key -n S-left resize-pane -L 10
bind-key -n S-down resize-pane -D 5
bind-key -n S-up resize-pane -U 5
bind-key -n S-right resize-pane -R 10

### split
unbind '"'
unbind %
bind-key \" split-window -h -c '#{pane_current_path}'
bind-key \' split-window -v -c '#{pane_current_path}'

bind c new-window -c '#{pane_current_path}'

# Move focused pane to a new window
bind-key b break-pane -d

# Detach session
bind-key C-b send-keys 'tat && exit' 'C-m'

# Kill session — X is a natural "close/delete" mnemonic
bind-key X run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'
